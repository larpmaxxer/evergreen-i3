[colors]
background = #1D281D
foreground = #F2E9DC
highlight = #F2E9DC
dim = #5A6B5A
alert = #A45A52
green = #7A9A6B

[bar/main]
monitor =
width = 100%
height = 28
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
padding-left = 1
padding-right = 1
module-margin-left = 2
module-margin-right = 2

font-0 = JetBrains Mono:size=10;2
font-1 = JetBrains Mono:size=10:weight=bold;2

modules-left = i3
modules-center = date
modules-right = cpu memory pulseaudio battery
tray-position = right
tray-padding = 4
tray-background = ${colors.background}

wm-restack = i3
override-redirect = false
cursor-click = pointer

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wssumbers = true
index-sort = true
enable-click = true
enable-scroll = true

label-focused = %index%
label-focused-background = ${colors.highlight}
label-focused-foreground = ${colors.background}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.dim}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.dim}
label-visible-padding = 2

[module/date]
type = internal/date
interval = 1
date = %A, %d %B
time = %H:%M
label = %date%  ·  %time%
label-foreground = ${colors.highlight}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu "
format-prefix-foreground = ${colors.dim}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 3
format-prefix = "mem "
format-prefix-foreground = ${colors.dim}
label = %percentage_used%%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "vol "
format-volume-prefix-foreground = ${colors.dim}
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.dim}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ACA0
full-at = 98

format-charging-prefix = "chr "
format-charging-prefix-foreground = ${colors.dim}
label-charging = %percentage%%

format-discharging-prefix = "bat "
format-discharging-prefix-foreground = ${colors.dim}
label-discharging = %percentage%%

label-full = full
label-full-foreground = ${colors.green}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
