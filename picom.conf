backend = "glx";
vsync = true;

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

inactive-opacity = 0.95;

opacity-rule = [
  "90:class_g = 'kitty'"
];

corner-radius = 15;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
